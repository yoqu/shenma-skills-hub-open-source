spring:
  datasource:
    url: ${SKILLSTACK_DB_URL}
    username: ${SKILLSTACK_DB_USERNAME}
    password: ${SKILLSTACK_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

skillstack:
  jwt:
    secret: ${SKILLSTACK_JWT_SECRET}
  cors:
    allowed-origins: ${SKILLSTACK_CORS_ALLOWED_ORIGINS}
  storage:
    local:
      base-dir: /data/skillstack/uploads

app:
  oauth:
    frontend-origin: ${OAUTH_FRONTEND_ORIGIN}
