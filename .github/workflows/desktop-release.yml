name: Desktop Release

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing desktop release tag (for example, desktop-v0.1.0)
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Verify release version
        shell: bash
        run: |
          package_version="$(node -p "require('./desktop/package.json').version")"
          expected_tag="desktop-v${package_version}"
          if [[ "${RELEASE_TAG}" != "${expected_tag}" ]]; then
            echo "Release tag ${RELEASE_TAG} does not match desktop package version ${package_version}."
            echo "Expected tag: ${expected_tag}"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Type-check desktop client
        run: npm --workspace desktop run lint

      - name: Test desktop client
        run: npm --workspace desktop test -- --run

  build:
    name: Build ${{ matrix.name }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-14
            script: dist:mac
            artifact: desktop-macos
            files: desktop/release/*.dmg
          - name: Windows
            os: windows-latest
            script: dist:win
            artifact: desktop-windows
            files: desktop/release/*.exe
          - name: Linux
            os: ubuntu-latest
            script: dist:linux
            artifact: desktop-linux
            files: |
              desktop/release/*.AppImage
              desktop/release/*.deb
    runs-on: ${{ matrix.os }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build installers
        shell: bash
        run: |
          for attempt in 1 2 3; do
            if npm --workspace desktop run ${{ matrix.script }} -- --publish never; then
              exit 0
            fi
            if [[ "${attempt}" -lt 3 ]]; then
              echo "Build attempt ${attempt} failed; retrying in 15 seconds."
              sleep 15
            fi
          done
          exit 1

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.files }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" release-assets/* --clobber
          else
            gh release create "${RELEASE_TAG}" release-assets/* \
              --verify-tag \
              --title "SkillStack Desktop ${RELEASE_TAG#desktop-v}" \
              --generate-notes
          fi
